<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAVI · Annotations</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header id="header">
    <div id="header-left">
      <img id="brand-mark" src="../../assets/logo.svg" alt="">
      <div id="brand-text">
        <h1>Annotations</h1>
        <span class="brand-sub">
          <span id="status-dot" aria-label="Connection status"></span>
          <span id="status-label">HAVI</span>
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button id="settings-toggle" class="icon-btn" aria-label="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="settings-panel">
    <div class="setting-group">
      <label class="setting-label" for="server-url-input">Server URL</label>
      <div class="input-row">
        <input class="input" type="url" id="server-url-input" placeholder="http://localhost:8090" spellcheck="false">
        <button class="btn btn-primary btn-sm" id="save-url-btn">Save</button>
      </div>
      <p class="setting-hint" id="settings-status">Non-localhost hosts will request browser permission.</p>
    </div>
  </div>

  <div id="connection-banner" class="hidden" role="alert">
    <svg class="banner-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <div class="banner-body">
      <div class="banner-title">Server unreachable</div>
      <div class="banner-sub">Check the URL in settings.</div>
    </div>
  </div>

  <div id="domain-scope">
    <span class="eyebrow">DOMAIN</span>
    <span id="domain-value" class="muted">—</span>
  </div>

  <div id="capture-bar">
    <div class="capture-row">
      <button id="capture-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/>
          <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
        </svg>
        Capture region
      </button>
      <button id="pick-element-btn" title="Pick element">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
        </svg>
      </button>
    </div>
    <div id="capture-hint">
      <kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>A</kbd>
      <span>capture region from anywhere</span>
    </div>
  </div>

  <div id="capture-alert" class="hidden" role="alert">
    <svg id="capture-alert-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="capture-alert-message"></span>
    <button id="capture-alert-action" class="hidden"></button>
    <button id="capture-alert-dismiss" aria-label="Dismiss">×</button>
  </div>

  <div id="filter-bar">
    <div class="state-chips" role="tablist">
      <button class="filter-btn active" data-state="" role="tab">All<span class="filter-count" data-count="all">0</span></button>
      <button class="filter-btn" data-state="open" role="tab">Open<span class="filter-count" data-count="open">0</span></button>
      <button class="filter-btn" data-state="resolved" role="tab">Resolved<span class="filter-count" data-count="resolved">0</span></button>
    </div>
  </div>

  <div id="list-meta" class="hidden">
    <div id="list-meta-left">
      <span class="eyebrow"><span id="list-meta-state">All</span></span>
      <span id="list-meta-count">0</span>
      <span class="muted">on this domain</span>
    </div>
  </div>

  <div id="annotation-list">
    <div id="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/>
          <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
        </svg>
      </div>
      <div id="empty-title">No annotations yet</div>
      <div id="empty-body">
        Press <kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>A</kbd> or use <strong>Capture region</strong> above to grab your first one.
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
