<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotations</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header id="header">
    <div id="header-left">
      <span id="status-dot"></span>
      <h1>Annotations</h1>
    </div>
    <button id="settings-toggle" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path d="M17.4 12.3a1.2 1.2 0 0 0 .2-1.3l-.5-1a1.2 1.2 0 0 0-1.1-.7h-.3a8 8 0 0 0-.5-.9l.2-.3a1.2 1.2 0 0 0-.2-1.3l-.7-.7a1.2 1.2 0 0 0-1.3-.2l-.3.2a8 8 0 0 0-.9-.5V5.3a1.2 1.2 0 0 0-.7-1.1l-1-.5a1.2 1.2 0 0 0-1.3.2l-.3.2a8 8 0 0 0-.9-.5h-.3a1.2 1.2 0 0 0-.7-1.1l-1-.5a1.2 1.2 0 0 0-1.3.2l-.7.7a1.2 1.2 0 0 0-.2 1.3l.2.3a8 8 0 0 0-.5.9h-.3a1.2 1.2 0 0 0-1.1.7l-.5 1a1.2 1.2 0 0 0 .2 1.3l.2.3a8 8 0 0 0 0 .9l-.2.3a1.2 1.2 0 0 0-.2 1.3l.5 1a1.2 1.2 0 0 0 1.1.7h.3a8 8 0 0 0 .5.9l-.2.3a1.2 1.2 0 0 0 .2 1.3l.7.7a1.2 1.2 0 0 0 1.3.2l.3-.2a8 8 0 0 0 .9.5v.3a1.2 1.2 0 0 0 .7 1.1l1 .5a1.2 1.2 0 0 0 1.3-.2l.3-.2a8 8 0 0 0 .9.5h.3a1.2 1.2 0 0 0 .7 1.1l1 .5a1.2 1.2 0 0 0 1.3-.2l.7-.7a1.2 1.2 0 0 0 .2-1.3l-.2-.3a8 8 0 0 0 .5-.9h.3a1.2 1.2 0 0 0 1.1-.7l.5-1Z"/>
      </svg>
    </button>
  </header>

  <div id="settings-panel">
    <label for="server-url-input">Server URL</label>
    <div id="settings-row">
      <input type="url" id="server-url-input" placeholder="http://localhost:8090" spellcheck="false">
      <button id="save-url-btn">Save</button>
    </div>
    <p id="settings-status"></p>
  </div>

  <div id="connection-banner" class="hidden">Server unavailable</div>

  <div id="filter-bar">
    <button class="filter-btn active" data-state="">All</button>
    <button class="filter-btn" data-state="open">Open</button>
    <button class="filter-btn" data-state="resolved">Resolved</button>
  </div>

  <div id="capture-bar">
    <button id="capture-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Capture
    </button>
    <span id="capture-hint">or press <kbd>Ctrl+Shift+A</kbd></span>
  </div>

  <div id="annotation-list">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <p>No annotations yet.</p>
      <p id="empty-hint">Click <strong>Capture</strong> above or press <kbd>Ctrl+Shift+A</kbd></p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
