name: Release server binary

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Skipped on tag pushes."
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#server-v}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            version="${{ inputs.version }}"
            if [ -z "$version" ]; then
              echo "::error::version input is required for workflow_dispatch"
              exit 1
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=server-v$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
